<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Make Quote — Spacioworks</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f0efe9;color:#1A1A1A;font-size:13px;}
.topbar{background:#1A1A1A;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;gap:12px;}
.topbar-logo{height:36px;}
.topbar-center{font-size:14px;font-weight:700;color:#fff;flex:1;text-align:center;}
.topbar-right{display:flex;gap:8px;}
.btn{padding:7px 14px;border-radius:8px;border:1px solid #ddd;background:#fff;cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;display:inline-flex;align-items:center;gap:5px;}
.btn-gold{background:#C9A84C;color:#1A1A1A;border-color:#C9A84C;}
.btn-danger{background:#fff;color:#A32D2D;border-color:#F09595;}
.body-wrap{display:grid;grid-template-columns:320px 1fr;height:calc(100vh - 57px);}
.left{background:#fff;border-right:1px solid #e8e6e0;overflow-y:auto;padding:16px;}
.right{overflow-y:auto;padding:16px 20px;}
.sec-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#C9A84C;margin-bottom:8px;padding-bottom:4px;border-bottom:2px solid #C9A84C;}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;}
.info-item label{font-size:10px;color:#aaa;text-transform:uppercase;letter-spacing:.04em;display:block;margin-bottom:2px;}
.info-item .val{font-size:13px;font-weight:600;}
.req-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:16px;}
.req-tag{background:#EEEDFE;color:#3C3489;border-radius:99px;padding:3px 10px;font-size:11px;font-weight:600;}
.left-tabs{display:flex;border-bottom:1px solid #eee;margin-bottom:14px;}
.left-tab{padding:7px 14px;font-size:12px;font-weight:600;color:#aaa;cursor:pointer;border-bottom:2px solid transparent;}
.left-tab.active{color:#1A1A1A;border-bottom-color:#C9A84C;}
.form-row{margin-bottom:12px;}
.form-row label{display:block;font-size:11px;font-weight:600;color:#888;text-transform:uppercase;margin-bottom:4px;}
.form-row input,.form-row textarea,.form-row select{width:100%;padding:7px 10px;border:1px solid #ddd;border-radius:8px;font-family:inherit;font-size:13px;outline:none;}
.room-card{background:#fff;border-radius:12px;margin-bottom:14px;overflow:hidden;border:1px solid #eee;}
.room-header{background:#1A1A1A;padding:10px 16px;display:flex;align-items:center;gap:8px;}
.room-header input{flex:1;background:transparent;border:none;color:#C9A84C;font-size:14px;font-weight:700;font-family:inherit;outline:none;}
.room-total{color:#fff;font-size:13px;font-weight:600;white-space:nowrap;}
.rm-del{border:none;background:transparent;color:#888;cursor:pointer;font-size:14px;}
.items-table{width:100%;border-collapse:collapse;}
.items-table th{padding:7px 10px;background:#f9f8f5;color:#888;font-size:10px;font-weight:700;text-transform:uppercase;text-align:left;border-bottom:1px solid #eee;}
.items-table td{padding:7px 10px;border-bottom:1px solid #f8f8f8;vertical-align:middle;}
.qty-input{width:60px;padding:4px 6px;border:1px solid #ddd;border-radius:6px;font-family:inherit;font-size:12px;text-align:center;outline:none;}
.del-item-btn{border:none;background:transparent;color:#ccc;cursor:pointer;font-size:13px;}
.add-room-btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:10px;border:2px dashed #C9A84C;border-radius:10px;background:transparent;color:#C9A84C;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;margin-bottom:14px;}
.summary-bar{background:#1A1A1A;border-radius:10px;padding:14px 16px;margin-top:16px;color:#fff;}
.sum-row{display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px;}
.sum-row .lbl{color:#aaa;}
.sum-divider{border:none;border-top:1px solid #333;margin:8px 0;}
.search-results{border:1px solid #eee;border-radius:8px;max-height:300px;overflow-y:auto;background:#fff;margin-top:4px;}
.search-result-item{padding:9px 12px;cursor:pointer;border-bottom:1px solid #f5f5f5;display:flex;justify-content:space-between;align-items:center;}
.search-result-item:hover{background:#f5f4f0;}
.empty-msg{text-align:center;padding:40px;color:#aaa;font-size:13px;}
.toast-el{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1A1A1A;color:#C9A84C;padding:10px 22px;border-radius:99px;font-size:13px;font-weight:700;z-index:9999;}
</style>
</head>
<body>
<div class="topbar">
  <img class="topbar-logo" src="https://vfucyxwmmetymmznbqsh.supabase.co/storage/v1/object/public/lead-files/spacioworks-logo.jpg" onerror="this.style.display='none'" alt="Spacioworks">
  <div class="topbar-center" id="topbar-title">Make Quote</div>
  <div class="topbar-right">
    <button class="btn" onclick="saveDraft()"><i class="ti ti-device-floppy"></i> Save Draft</button>
    <button class="btn btn-gold" onclick="publishQuote()"><i class="ti ti-send"></i> Publish & Share</button>
    <button class="btn btn-danger" onclick="window.close()"><i class="ti ti-x"></i> Close</button>
  </div>
</div>

<div class="body-wrap">
  <div class="left">
    <div class="left-tabs">
      <div class="left-tab active" onclick="switchTab('info')">Lead Info</div>
      <div class="left-tab" onclick="switchTab('search')">Add Material</div>
      <div class="left-tab" onclick="switchTab('settings')">Quote Settings</div>
    </div>
    <div id="tab-info">
      <div class="sec-title">Client Details</div>
      <div class="info-grid" id="info-grid"><div style="color:#aaa;font-size:12px;">Loading...</div></div>
      <div class="sec-title">Requirements</div>
      <div class="req-tags" id="req-tags"></div>
      <div class="sec-title">Requirement Comments</div>
      <p id="req-comment" style="font-size:12px;color:#555;line-height:1.6;margin-bottom:16px;"></p>
    </div>
    <div id="tab-search" style="display:none;">
      <div class="sec-title">Search Materials</div>
      <select id="room-select" style="width:100%;padding:7px 10px;border:1px solid #ddd;border-radius:8px;font-family:inherit;font-size:13px;outline:none;margin-bottom:8px;">
        <option value="">— Select room to add to —</option>
      </select>
      <select id="cat-filter" onchange="renderSearch()" style="width:100%;padding:7px 10px;border:1px solid #ddd;border-radius:8px;font-family:inherit;font-size:13px;outline:none;margin-bottom:8px;">
        <option value="">All Categories</option>
      </select>
      <input type="text" id="mat-search" placeholder="Search product name..." oninput="renderSearch()" style="width:100%;padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-size:13px;font-family:inherit;outline:none;margin-bottom:4px;">
      <div class="search-results" id="search-results"></div>
    </div>
    <div id="tab-settings" style="display:none;">
      <div class="sec-title">Quote Details</div>
      <div class="form-row"><label>Valid Till</label><input type="date" id="q-valid-till"></div>
      <div class="form-row"><label>Discount (₹)</label><input type="number" id="q-discount" value="0" oninput="updateSummary()"></div>
      <div class="form-row"><label>Notes</label><textarea id="q-notes" rows="3" placeholder="Internal notes..."></textarea></div>
      <div class="sec-title" style="margin-top:8px;">Live Summary</div>
      <div class="summary-bar" id="left-summary"></div>
    </div>
  </div>

  <div class="right">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
      <div style="font-size:15px;font-weight:700;">Rooms & Items</div>
      <button class="btn btn-gold" onclick="addRoom()"><i class="ti ti-plus"></i> Add Room</button>
    </div>
    <div id="rooms-container"></div>
    <div id="bottom-summary"></div>
  </div>
</div>

<script>
const SB_URL = 'https://vfucyxwmmetymmznbqsh.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZmdWN5eHdtbWV0eW1tem5icXNoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAxNjI0NzksImV4cCI6MjA5NTczODQ3OX0.dcrCbW_3h1sSEw25KqL3W7OU6Nq3KVm7Rclp9CctAMs';

let G = { lead: null, priceList: [], rooms: [], quoteId: null };

async function api(path, method, body) {
  const url = SB_URL + '/rest/v1/' + path;
  const opts = {
    method: method || 'GET',
    headers: {
      'apikey': SB_KEY,
      'Authorization': 'Bearer ' + SB_KEY,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation'
    }
  };
  if (body) opts.body = JSON.stringify(body);
  try {
    const r = await fetch(url, opts);
    const text = await r.text();
    if (!text) return [];
    const d = JSON.parse(text);
    if (!r.ok) { console.warn('API error', r.status, d); return []; }
    return Array.isArray(d) ? d : [d];
  } catch(e) { console.error('API fail:', e); return []; }
}

async function init() {
  const leadId = new URLSearchParams(location.search).get('lead');
  if (!leadId) { document.body.innerHTML = '<div style="padding:40px;text-align:center;color:red;">No lead ID in URL.</div>'; return; }

  const [leads, prices] = await Promise.all([
    api('leads?id=eq.' + leadId + '&select=*'),
    api('price_list?active=eq.true&order=category,name&select=*')
  ]);

  console.log('leads:', leads, 'prices count:', prices.length);

  G.lead = leads[0] || null;
  G.priceList = prices || [];

  // Try quotes
  try {
    const quotes = await api('quotes?lead_id=eq.' + leadId + '&order=created_at.desc');
    const draft = (quotes || []).find(q => q.status === 'draft');
    if (draft) {
      G.quoteId = draft.id;
      G.rooms = draft.rooms || [];
      document.getElementById('q-discount').value = draft.discount || 0;
      document.getElementById('q-notes').value = draft.notes || '';
      if (draft.valid_till) document.getElementById('q-valid-till').value = draft.valid_till;
    }
  } catch(e) { console.warn('Quotes not available:', e); }

  // Default valid till = 7 days
  if (!document.getElementById('q-valid-till').value) {
    const d = new Date(); d.setDate(d.getDate() + 7);
    document.getElementById('q-valid-till').value = d.toISOString().slice(0, 10);
  }

  // Pre-create rooms from requirements if no draft
  if (!G.quoteId && G.lead) {
    let reqs = G.lead.requirements || [];
    if (typeof reqs === 'string') { try { reqs = JSON.parse(reqs); } catch(e) { reqs = []; } }
    if (Array.isArray(reqs) && reqs.length) {
      reqs.forEach(r => G.rooms.push({ id: 'r' + Date.now() + Math.random(), name: r, items: [] }));
    } else {
      G.rooms.push({ id: 'r' + Date.now(), name: 'Room 1', items: [] });
    }
  } else if (!G.quoteId) {
    G.rooms.push({ id: 'r' + Date.now(), name: 'Room 1', items: [] });
  }

  renderInfo();
  renderRooms();
  updateRoomSelect();
  updateSummary();
  populateCats();
  document.getElementById('topbar-title').textContent = 'Make Quote — ' + (G.lead ? (G.lead.name || 'Unknown') : '');
}

function renderInfo() {
  const l = G.lead || {};
  document.getElementById('info-grid').innerHTML = [
    ['Client', l.name], ['Phone', l.phone],
    ['City', l.city], ['Property', l.property_type],
    ['Budget', l.interior_budget], ['Project', l.project_name || l.builder_name]
  ].map(([k, v]) => '<div class="info-item"><label>' + k + '</label><div class="val">' + (v || '—') + '</div></div>').join('');

  let reqs = l.requirements || [];
  if (typeof reqs === 'string') { try { reqs = JSON.parse(reqs); } catch(e) { reqs = []; } }
  document.getElementById('req-tags').innerHTML = (Array.isArray(reqs) && reqs.length)
    ? reqs.map(r => '<span class="req-tag">' + r + '</span>').join('')
    : '<span style="color:#aaa;font-size:12px;">None recorded</span>';
  document.getElementById('req-comment').textContent = l.requirement_comment || '—';
}

function addRoom() {
  G.rooms.push({ id: 'r' + Date.now(), name: 'New Room', items: [] });
  renderRooms(); updateRoomSelect(); updateSummary();
}

function removeRoom(ri) {
  if (!confirm('Remove this room?')) return;
  G.rooms.splice(ri, 1);
  renderRooms(); updateRoomSelect(); updateSummary();
}

function roomTotal(room) {
  return (room.items || []).reduce((s, it) => s + (parseFloat(it.qty || 0) * parseFloat(it.rate || 0)), 0);
}

function fmt(n) { return '₹' + Math.round(n || 0).toLocaleString('en-IN'); }

function renderRooms() {
  const el = document.getElementById('rooms-container');
  if (!G.rooms.length) {
    el.innerHTML = '<div class="empty-msg">No rooms yet — click "Add Room"</div>';
    return;
  }
  el.innerHTML = G.rooms.map((room, ri) => {
    const rt = roomTotal(room);
    return '<div class="room-card">' +
      '<div class="room-header">' +
        '<input value="' + esc(room.name) + '" onchange="G.rooms[' + ri + '].name=this.value;updateRoomSelect();updateSummary();" placeholder="Room name">' +
        '<span class="room-total">' + fmt(rt) + '</span>' +
        '<button class="rm-del" onclick="removeRoom(' + ri + ')"><i class="ti ti-trash"></i></button>' +
      '</div>' +
      (room.items.length ?
        '<table class="items-table"><thead><tr>' +
          '<th>Product</th><th>Unit</th><th style="text-align:center">Qty</th><th style="text-align:right">Rate</th><th style="text-align:right">Amount</th><th></th>' +
        '</tr></thead><tbody>' +
        room.items.map((it, ii) =>
          '<tr><td><strong>' + esc(it.name) + '</strong><br><small style="color:#888">' + esc(it.description || '') + '</small></td>' +
          '<td>' + (it.unit || 'SQFT') + '</td>' +
          '<td style="text-align:center"><input class="qty-input" type="number" value="' + (it.qty || 1) + '" min="0.01" step="0.01" onchange="G.rooms[' + ri + '].items[' + ii + '].qty=parseFloat(this.value)||0;renderRooms();updateSummary();"></td>' +
          '<td style="text-align:right">' + fmt(it.rate) + '</td>' +
          '<td style="text-align:right"><strong>' + fmt(parseFloat(it.qty || 0) * parseFloat(it.rate || 0)) + '</strong></td>' +
          '<td><button class="del-item-btn" onclick="G.rooms[' + ri + '].items.splice(' + ii + ',1);renderRooms();updateSummary();"><i class="ti ti-x"></i></button></td>' +
          '</tr>'
        ).join('') +
        '</tbody></table>'
        : '<div style="padding:10px 14px;font-size:12px;color:#ccc;">No items — use "Add Material" tab</div>'
      ) +
    '</div>';
  }).join('');
}

function updateRoomSelect() {
  const sel = document.getElementById('room-select');
  const cur = sel.value;
  sel.innerHTML = '<option value="">— Select room to add to —</option>' +
    G.rooms.map(r => '<option value="' + r.id + '">' + esc(r.name) + '</option>').join('');
  if (cur) sel.value = cur;
}

function updateSummary() {
  const sub = G.rooms.reduce((s, r) => s + roomTotal(r), 0);
  const disc = parseFloat(document.getElementById('q-discount').value || 0);
  const after = Math.max(0, sub - disc);
  const gst = after * 0.18;
  const total = after + gst;
  const html =
    '<div class="sum-row"><span class="lbl">Subtotal</span><span>' + fmt(sub) + '</span></div>' +
    (disc > 0 ? '<div class="sum-row"><span class="lbl">Discount</span><span style="color:#C9A84C">−' + fmt(disc) + '</span></div>' : '') +
    '<div class="sum-row"><span class="lbl">GST (18%)</span><span>' + fmt(gst) + '</span></div>' +
    '<hr class="sum-divider">' +
    '<div class="sum-row" style="font-size:15px;font-weight:800;"><span style="color:#C9A84C">Total Payable</span><span style="color:#C9A84C">' + fmt(total) + '</span></div>';
  document.getElementById('left-summary').innerHTML = html;
  document.getElementById('bottom-summary').innerHTML = '<div class="summary-bar">' + html + '</div>';
}

function populateCats() {
  const cats = [...new Set(G.priceList.map(p => p.category).filter(Boolean))].sort();
  const sel = document.getElementById('cat-filter');
  cats.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; sel.appendChild(o); });
}

function renderSearch() {
  const q = (document.getElementById('mat-search').value || '').toLowerCase();
  const cat = document.getElementById('cat-filter').value;
  let items = G.priceList;
  if (cat) items = items.filter(p => p.category === cat);
  if (q) items = items.filter(p => (p.name || '').toLowerCase().includes(q) || (p.description || '').toLowerCase().includes(q));
  const el = document.getElementById('search-results');
  if (!items.length) { el.innerHTML = '<div style="padding:12px;text-align:center;color:#aaa;font-size:12px;">No products found</div>'; return; }
  el.innerHTML = items.slice(0, 30).map(p =>
    '<div class="search-result-item" onclick="addItem(\'' + p.id + '\')" style="align-items:center;gap:10px;">' +
      (p.image_url
        ? '<img src="' + p.image_url + '" style="width:44px;height:44px;object-fit:cover;border-radius:6px;border:1px solid #eee;flex-shrink:0;" onerror="this.style.display=\'none\'">'
        : '<div style="width:44px;height:44px;background:#f5f4f0;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px;color:#ccc;">📦</div>') +
      '<div style="flex:1;min-width:0;">' +
        '<div style="font-weight:600;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + esc((p.description || p.name || '').substring(0, 60)) + '</div>' +
        '<div style="font-size:10px;color:#aaa;margin-top:2px;">' + (p.sku ? 'SKU: ' + esc(p.sku) + ' · ' : '') + esc(p.category || '') + '</div>' +
      '</div>' +
      '<div style="text-align:right;flex-shrink:0;margin-left:6px;"><div style="font-weight:700;font-size:13px;">' + fmt(p.rate) + '</div><div style="font-size:10px;color:#aaa;">per ' + (p.uom || p.unit || 'SQFT') + '</div></div>' +
    '</div>'
  ).join('');
}

function addItem(pid) {
  const roomId = document.getElementById('room-select').value;
  if (!roomId) { alert('Select a room first!'); return; }
  const p = G.priceList.find(x => x.id === pid);
  if (!p) return;
  const ri = G.rooms.findIndex(r => r.id === roomId);
  if (ri < 0) return;
  G.rooms[ri].items.push({ productId: p.id, name: p.name, description: p.description || '', unit: p.unit || 'SQFT', qty: 1, rate: p.rate || 0 });
  renderRooms(); updateSummary();
  setTimeout(() => { const el = document.querySelector('.room-card:nth-child(' + (ri + 1) + ')'); if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }, 100);
}

function switchTab(t) {
  ['info', 'search', 'settings'].forEach(id => {
    document.getElementById('tab-' + id).style.display = id === t ? 'block' : 'none';
  });
  document.querySelectorAll('.left-tab').forEach((el, i) => {
    el.classList.toggle('active', ['info', 'search', 'settings'][i] === t);
  });
  if (t === 'search') renderSearch();
}

function esc(s) { return (s || '').toString().replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }

async function buildPayload(status) {
  const leadId = new URLSearchParams(location.search).get('lead');
  return {
    lead_id: leadId, status, rooms: G.rooms,
    discount: parseFloat(document.getElementById('q-discount').value || 0),
    notes: document.getElementById('q-notes').value,
    valid_till: document.getElementById('q-valid-till').value || null,
    gst_percent: 18, updated_at: new Date().toISOString()
  };
}

function toast(msg) {
  const t = document.createElement('div'); t.className = 'toast-el'; t.textContent = msg;
  document.body.appendChild(t); setTimeout(() => t.remove(), 2500);
}

async function saveDraft() {
  const payload = await buildPayload('draft');
  if (G.quoteId) {
    await api('quotes?id=eq.' + G.quoteId, 'PATCH', payload);
  } else {
    payload.quote_number = 'Q-' + Date.now().toString().slice(-6);
    const data = await api('quotes', 'POST', payload);
    if (data[0]) G.quoteId = data[0].id;
  }
  toast('✓ Draft saved!');
}

async function publishQuote() {
  if (!G.rooms.some(r => r.items.length)) { alert('Add at least one item before publishing.'); return; }
  const payload = await buildPayload('published');
  if (!G.quoteId) {
    payload.quote_number = 'Q-' + Date.now().toString().slice(-6);
    const data = await api('quotes', 'POST', payload);
    if (data[0]) G.quoteId = data[0].id;
  } else {
    await api('quotes?id=eq.' + G.quoteId, 'PATCH', payload);
  }
  if (!G.quoteId) { alert('Error saving. Try again.'); return; }
  const link = location.origin + '/quote.html?id=' + G.quoteId;
  const name = G.lead ? (G.lead.name || 'Customer') : 'Customer';
  const msg = encodeURIComponent('Hi ' + name + ',\n\nHere is your personalised interior design quote from Spacioworks.\n\nView here: ' + link + '\n\nWarm regards,\nSpacioworks Team\n+91-9600011441 | care@spacioworks.in');
  const div = document.createElement('div');
  div.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:9999;display:flex;align-items:center;justify-content:center;';
  div.innerHTML = '<div style="background:#fff;border-radius:16px;padding:28px;max-width:480px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,.2);">' +
    '<div style="font-size:16px;font-weight:800;margin-bottom:6px;">Quote Published! 🎉</div>' +
    '<div style="font-size:13px;color:#888;margin-bottom:14px;">Share with ' + esc(name) + ':</div>' +
    '<div style="background:#f5f4f0;border-radius:8px;padding:10px 12px;font-size:12px;word-break:break-all;margin-bottom:14px;">' + link + '</div>' +
    '<div style="display:flex;flex-wrap:wrap;gap:8px;">' +
    '<button onclick="navigator.clipboard.writeText(\'' + link + '\').then(()=>this.textContent=\'✓ Copied!\')" style="flex:1;padding:10px;border:1px solid #ddd;border-radius:8px;background:#fff;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;"><i class="ti ti-copy"></i> Copy Link</button>' +
    '<a href="https://wa.me/?text=' + msg + '" target="_blank" style="flex:1;padding:10px;border:none;border-radius:8px;background:#25D366;color:#fff;font-weight:700;font-size:13px;text-align:center;text-decoration:none;display:block;"><i class="ti ti-brand-whatsapp"></i> WhatsApp</a>' +
    '<button onclick="this.closest(\'div[style*=fixed]\').remove()" style="flex:1;padding:10px;border:1px solid #ddd;border-radius:8px;background:#fff;cursor:pointer;font-family:inherit;font-size:13px;">Close</button>' +
    '</div></div>';
  document.body.appendChild(div);
}

init();
</script>
